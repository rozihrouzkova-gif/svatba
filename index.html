<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Svatební odpočítávač</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
body{margin:0;background:transparent;font-family:"Cormorant Garamond",serif;color:#000}
#cd{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-end;gap:16px;padding:10px}
.group{display:flex;align-items:flex-end;gap:4px}
.digits{display:flex;gap:2px;perspective:700px}
.digit{width:.72em;height:1.15em;overflow:hidden;display:inline-block;font-size:64px;line-height:1.15;font-weight:600;text-align:center;transform-style:preserve-3d}
.digit span{display:block;transition:transform .45s cubic-bezier(.2,.8,.2,1)}
.digit.flip span{transform:rotateX(-360deg)}
.label{font-size:26px;margin-left:4px;padding-bottom:8px}
.dot{font-size:36px;padding-bottom:8px}
@media(max-width:700px){.digit{font-size:42px}.label{font-size:18px}.dot{display:none}}
</style>
</head>
<body>
<div id="cd"></div>

<script>
const target=new Date("2026-10-10T13:00:00");

const parts=[
 {k:"days",l:"dní",len:3},
 {k:"hours",l:"hodin",len:2},
 {k:"minutes",l:"minut",len:2},
 {k:"seconds",l:"sekund",len:2}
];

const root=document.getElementById("cd");
const refs={};

parts.forEach((p,i)=>{
 const g=document.createElement("div"); g.className="group";
 const digits=document.createElement("div"); digits.className="digits";
 refs[p.k]=[];
 for(let j=0;j<p.len;j++){
   const d=document.createElement("div"); d.className="digit";
   const s=document.createElement("span"); s.textContent="0";
   d.appendChild(s); digits.appendChild(d); refs[p.k].push({box:d,span:s,val:"0"});
 }
 g.appendChild(digits);
 const lab=document.createElement("div"); lab.className="label"; lab.textContent=p.l;
 g.appendChild(lab);
 root.appendChild(g);
 if(i<parts.length-1){
   const dot=document.createElement("div"); dot.className="dot"; dot.textContent="·";
   root.appendChild(dot);
 }
});

function setDigits(key,val){
 const arr=refs[key];
 const txt=String(val).padStart(arr.length,"0");
 arr.forEach((d,i)=>{
   if(d.val!==txt[i]){
      d.val=txt[i];
      d.box.classList.remove("flip");
      void d.box.offsetWidth;
      d.span.textContent=txt[i];
      d.box.classList.add("flip");
   }
 });
}

function tick(){
 let diff=target-new Date();
 if(diff<0){root.innerHTML="<div style='font-size:52px'>Dnes je ten den! ❤️</div>";return;}
 const days=Math.floor(diff/86400000); diff%=86400000;
 const hours=Math.floor(diff/3600000); diff%=3600000;
 const minutes=Math.floor(diff/60000); diff%=60000;
 const seconds=Math.floor(diff/1000);
 setDigits("days",days);
 setDigits("hours",hours);
 setDigits("minutes",minutes);
 setDigits("seconds",seconds);
}
tick();
setInterval(tick,1000);
</script>
</body>
</html>
